<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sistema de Gestión</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>

function mostrarSistema(){
document.getElementById("inicio").style.display="none";
document.getElementById("vehiculos").style.display="block";
}

function volverInicio(){
document.getElementById("inicio").style.display="block";
document.getElementById("vehiculos").style.display="none";
}

</script>

</head>

<body class="bg-gray-100">

<!-- ENCABEZADO -->

<header class="bg-blue-600 text-white text-center text-2xl p-4 font-bold">
Sistema de Gestión
</header>


<!-- PANTALLA INICIO -->

<div id="inicio" class="flex justify-center items-center h-screen">

<button onclick="mostrarSistema()"
class="bg-green-500 text-white px-8 py-4 text-xl rounded-lg shadow-lg hover:bg-green-600">

Sistema de Vehículos

</button>

</div>


<!-- SISTEMA DE VEHICULOS -->

<div id="vehiculos" style="display:none">

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 shadow-lg rounded-lg">

<h2 class="text-xl font-semibold mb-6 text-center">
Registro de Vehículos
</h2>

<form class="space-y-4">

<div>
<label class="font-semibold">ID Vehículo</label>
<input type="text" class="w-full border rounded p-2">
</div>

<div>
<label class="font-semibold">ID Cliente</label>
<input type="text" class="w-full border rounded p-2">
</div>

<div>
<label class="font-semibold">Placa</label>
<input type="text" class="w-full border rounded p-2">
</div>

<div>
<label class="font-semibold">Marca</label>
<input type="text" class="w-full border rounded p-2">
</div>

<div>
<label class="font-semibold">Color</label>
<input type="text" class="w-full border rounded p-2">
</div>

<div class="flex gap-4 justify-center mt-6">

<button class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">
Guardar
</button>

<button type="button"
onclick="volverInicio()"
class="bg-gray-500 text-white px-6 py-2 rounded hover:bg-gray-600">

Volver

</button>

</div>

</form>

</div>

</div>

</body>
</html>
