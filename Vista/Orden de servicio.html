<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orden de Servicio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-4xl mx-auto bg-white shadow-lg rounded-xl p-8">
  <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">
    Orden de Servicio
  </h1>

  <!-- Datos del cliente -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <input id="cliente" type="text" placeholder="Nombre del Cliente"
      class="border rounded-lg p-2 w-full">

    <input id="documento" type="text" placeholder="Documento"
      class="border rounded-lg p-2 w-full">

    <input id="telefono" type="text" placeholder="Teléfono"
      class="border rounded-lg p-2 w-full">

    <input id="fecha" type="date"
      class="border rounded-lg p-2 w-full">
  </div>

  <!-- Agregar servicio -->
  <div class="grid grid-cols-4 gap-4 mb-4">
    <input id="servicio" type="text" placeholder="Servicio"
      class="border rounded-lg p-2">

    <input id="cantidad" type="number" placeholder="Cantidad"
      class="border rounded-lg p-2">

    <input id="precio" type="number" placeholder="Precio"
      class="border rounded-lg p-2">

    <button onclick="agregarServicio()"
      class="bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
      Agregar
    </button>
  </div>

  <!-- Tabla -->
  <div class="overflow-x-auto mb-6">
    <table class="w-full border-collapse border border-gray-300">
      <thead class="bg-blue-500 text-white">
        <tr>
          <th class="border p-2">Servicio</th>
          <th class="border p-2">Cantidad</th>
          <th class="border p-2">Precio</th>
          <th class="border p-2">Total</th>
        </tr>
      </thead>
      <tbody id="tablaServicios"></tbody>
    </table>
  </div>

  <!-- Total General -->
  <div class="text-right mb-6">
    <h2 class="text-xl font-bold">
      Total General: $<span id="totalGeneral">0</span>
    </h2>
  </div>

  <!-- Botón Guardar -->
  <div class="text-center">
    <button onclick="guardarOrden()"
      class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
      Guardar Orden
    </button>
  </div>

  <script>
    let servicios = [];
    let numeroOrden = parseInt(localStorage.getItem("numeroOrden")) || 1;

    function mostrarNumeroOrden() {
      document.getElementById("numeroOrden").textContent =
        "#" + String(numeroOrden).padStart(3, "0");
    }

    mostrarNumeroOrden();

    function agregarServicio() {
      const servicio = document.getElementById("servicio").value.trim();
      const cantidad = parseInt(document.getElementById("cantidad").value);
      const precio = parseFloat(document.getElementById("precio").value);

      if (!servicio || !cantidad || !precio) {
        alert("Completa todos los campos del servicio");
        return;
      }

      const total = cantidad * precio;
      servicios.push({ servicio, cantidad, precio, total });

      actualizarTabla();
      limpiarCampos();
    }

    function actualizarTabla() {
      const tabla = document.getElementById("tablaServicios");
      tabla.innerHTML = "";

      let totalGeneral = 0;

      servicios.forEach((item, index) => {
        totalGeneral += item.total;

        tabla.innerHTML += `
          <tr class="hover:bg-[#1f2937]/80 transition">
            <td class="border border-[#28443c] p-3">${item.servicio}</td>
            <td class="border border-[#28443c] p-3">${item.cantidad}</td>
            <td class="border border-[#28443c] p-3">$${item.precio.toLocaleString()}</td>
            <td class="border border-[#28443c] p-3">$${item.total.toLocaleString()}</td>
            <td class="border border-[#28443c] p-3 text-center no-print">
              <button onclick="eliminarServicio(${index})"
                class="bg-red-700 hover:bg-red-800 text-white px-3 py-1 rounded-lg transition">
                Eliminar
              </button>
            </td>
          </tr>
        `;
      });

      document.getElementById("totalGeneral").textContent = totalGeneral.toLocaleString();
    }

    function limpiarCampos() {
      document.getElementById("servicio").value = "";
      document.getElementById("cantidad").value = "";
      document.getElementById("precio").value = "";
    }

    function eliminarServicio(index) {
      servicios.splice(index, 1);
      actualizarTabla();
    }

    function guardarOrden() {
      const cliente = document.getElementById("cliente").value.trim();
      const documento = document.getElementById("documento").value.trim();
      const telefono = document.getElementById("telefono").value.trim();
      const fecha = document.getElementById("fecha").value;
      const observaciones = document.getElementById("observaciones").value.trim();
      const total = document.getElementById("totalGeneral").textContent;

      if (!cliente || !documento || !telefono || !fecha || servicios.length === 0) {
        alert("Completa los datos del cliente y agrega al menos un servicio");
        return;
      }

      const orden = {
        numeroOrden: document.getElementById("numeroOrden").textContent,
        cliente,
        documento,
        telefono,
        fecha,
        observaciones,
        servicios,
        total
      };

      let ordenes = JSON.parse(localStorage.getItem("ordenesServicio")) || [];
      ordenes.push(orden);

      localStorage.setItem("ordenesServicio", JSON.stringify(ordenes));
      localStorage.setItem("ordenServicio", JSON.stringify(orden));

      alert("Orden guardada correctamente 💾");

      numeroOrden++;
      localStorage.setItem("numeroOrden", numeroOrden);

      limpiarTodo(false);
      mostrarNumeroOrden();
      cargarHistorial();
    }

    function limpiarTodo(confirmar = true) {
      if (!confirmar || confirm("¿Seguro que quieres borrar toda la orden actual?")) {
        document.getElementById("cliente").value = "";
        document.getElementById("documento").value = "";
        document.getElementById("telefono").value = "";
        document.getElementById("fecha").value = "";
        document.getElementById("observaciones").value = "";

        servicios = [];
        actualizarTabla();

        localStorage.removeItem("ordenServicio");
      }
    }

    function cargarHistorial() {
      const tabla = document.getElementById("tablaHistorial");
      tabla.innerHTML = "";

      const ordenes = JSON.parse(localStorage.getItem("ordenesServicio")) || [];

      if (ordenes.length === 0) {
        tabla.innerHTML = `
          <tr>
            <td colspan="6" class="border border-[#28443c] p-4 text-center text-slate-400">
              No hay órdenes guardadas todavía.
            </td>
          </tr>
        `;
        return;
      }

      ordenes.forEach(orden => {
        tabla.innerHTML += `
          <tr class="hover:bg-[#1f2937]/80 transition">
            <td class="border border-[#28443c] p-3">${orden.numeroOrden}</td>
            <td class="border border-[#28443c] p-3">${orden.cliente}</td>
            <td class="border border-[#28443c] p-3">${orden.documento}</td>
            <td class="border border-[#28443c] p-3">${orden.telefono}</td>
            <td class="border border-[#28443c] p-3">${orden.fecha}</td>
            <td class="border border-[#28443c] p-3">$${orden.total}</td>
          </tr>
        `;
      });
    }

    window.onload = function() {
      const ordenGuardada = localStorage.getItem("ordenServicio");

      if (ordenGuardada) {
        const orden = JSON.parse(ordenGuardada);

        document.getElementById("cliente").value = orden.cliente || "";
        document.getElementById("documento").value = orden.documento || "";
        document.getElementById("telefono").value = orden.telefono || "";
        document.getElementById("fecha").value = orden.fecha || "";
        document.getElementById("observaciones").value = orden.observaciones || "";

        servicios = orden.servicios || [];
        actualizarTabla();
      }

      cargarHistorial();
    }
  </script>
</body>
</html>
