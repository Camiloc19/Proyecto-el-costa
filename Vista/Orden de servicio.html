<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orden de Servicio</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media print {
      body {
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .no-print {
        display: none !important;
      }

      .print-container {
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        max-width: 100% !important;
        width: 100% !important;
        padding: 20px !important;
        margin: 0 !important;
        background: white !important;
      }

      input, textarea {
        border: none !important;
        background: white !important;
        color: black !important;
        box-shadow: none !important;
        outline: none !important;
      }

      table {
        width: 100% !important;
        border-collapse: collapse !important;
      }

      th, td {
        border: 1px solid black !important;
        padding: 8px !important;
        color: black !important;
        font-size: 12px !important;
      }

      h1, h2, h3, p, span, label {
        color: black !important;
      }
    }
  </style>
</head>

<body class="min-h-screen bg-cover bg-center bg-no-repeat p-6"
  style="background-image: linear-gradient(rgba(5, 10, 8, 0.82), rgba(10, 20, 18, 0.88)), url('fondo-taller.jpg');">

  <div class="print-container max-w-6xl mx-auto bg-[#0b1120]/85 backdrop-blur-lg border border-[#28443c] shadow-2xl rounded-3xl p-8 text-white">
    
    <!-- Encabezado -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-8 border-b border-[#1f3b33] pb-6">
      <div>
        <h1 class="text-4xl font-extrabold tracking-wide text-[#d1fae5]">
          Orden de Servicio
        </h1>
        <p class="text-slate-400 mt-2">
          Registro y control de servicios automotrices
        </p>
      </div>

      <div class="text-left md:text-right">
        <p class="text-slate-400 text-sm">N° de Orden</p>
        <h2 class="text-2xl font-bold text-[#86efac]" id="numeroOrden">#001</h2>
      </div>
    </div>

    <!-- Datos del cliente -->
    <h3 class="text-xl font-semibold text-[#93c5fd] mb-4">Datos del Cliente</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
      <input id="cliente" type="text" placeholder="Nombre del Cliente"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">

      <input id="documento" type="text" placeholder="Documento"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">

      <input id="telefono" type="text" placeholder="Teléfono"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">

      <input id="fecha" type="date"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">
    </div>

    <!-- Servicios -->
    <h3 class="text-xl font-semibold text-[#93c5fd] mb-4">Agregar Servicio</h3>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <input id="servicio" type="text" placeholder="Servicio"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">

      <input id="cantidad" type="number" placeholder="Cantidad"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">

      <input id="precio" type="number" placeholder="Precio"
        class="bg-[#111827]/80 border border-[#355c4a] rounded-xl p-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]">

      <button onclick="agregarServicio()"
        class="bg-[#14532d] hover:bg-[#166534] text-white font-semibold rounded-xl px-4 py-3 transition shadow-lg">
        Agregar
      </button>
    </div>

    <!-- Tabla de servicios -->
    <div class="overflow-x-auto mb-8">
      <table class="w-full border-collapse overflow-hidden rounded-2xl">
        <thead class="bg-[#0f172a] text-[#d1fae5]">
          <tr>
            <th class="border border-[#28443c] p-3">Servicio</th>
            <th class="border border-[#28443c] p-3">Cantidad</th>
            <th class="border border-[#28443c] p-3">Precio</th>
            <th class="border border-[#28443c] p-3">Total</th>
            <th class="border border-[#28443c] p-3 no-print">Acción</th>
          </tr>
        </thead>
        <tbody id="tablaServicios" class="bg-[#111827]/70 text-slate-200"></tbody>
      </table>
    </div>

    <!-- Observaciones -->
    <div class="mb-8">
      <label class="block text-lg font-semibold text-[#93c5fd] mb-3">Observaciones</label>
      <textarea id="observaciones" rows="4" placeholder="Escribe observaciones adicionales..."
        class="w-full bg-[#111827]/80 border border-[#355c4a] rounded-2xl p-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#3b82f6]"></textarea>
    </div>

    <!-- Total -->
    <div class="flex justify-end mb-8">
      <div class="bg-[#0f172a]/80 border border-[#28443c] rounded-2xl px-6 py-4 shadow-lg">
        <h2 class="text-2xl font-bold text-[#86efac]">
          Total General: $<span id="totalGeneral">0</span>
        </h2>
      </div>
    </div>

    <!-- Botones -->
    <div class="flex flex-wrap gap-4 justify-center no-print mb-12">
      <button onclick="guardarOrden()"
        class="bg-[#14532d] hover:bg-[#166534] text-white font-semibold px-6 py-3 rounded-xl shadow-lg transition">
        Guardar Orden
      </button>

      <button onclick="limpiarTodo()"
        class="bg-[#1e3a8a] hover:bg-[#1d4ed8] text-white font-semibold px-6 py-3 rounded-xl shadow-lg transition">
        Limpiar Todo
      </button>

      <button onclick="window.print()"
        class="bg-slate-800 hover:bg-slate-700 text-white font-semibold px-6 py-3 rounded-xl shadow-lg transition">
        Imprimir
      </button>

      <button onclick="cargarHistorial()"
        class="bg-[#1e293b] hover:bg-[#334155] text-white font-semibold px-6 py-3 rounded-xl shadow-lg transition">
        Actualizar Historial
      </button>
    </div>

    <!-- Historial -->
    <div class="border-t border-[#1f3b33] pt-8">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h3 class="text-2xl font-bold text-[#d1fae5]">Historial de Órdenes</h3>
          <p class="text-slate-400 text-sm mt-1">Órdenes guardadas en el navegador</p>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse overflow-hidden rounded-2xl">
          <thead class="bg-[#0f172a] text-[#d1fae5]">
            <tr>
              <th class="border border-[#28443c] p-3">N° Orden</th>
              <th class="border border-[#28443c] p-3">Cliente</th>
              <th class="border border-[#28443c] p-3">Documento</th>
              <th class="border border-[#28443c] p-3">Teléfono</th>
              <th class="border border-[#28443c] p-3">Fecha</th>
              <th class="border border-[#28443c] p-3">Total</th>
            </tr>
          </thead>
          <tbody id="tablaHistorial" class="bg-[#111827]/70 text-slate-200"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let servicios = [];
    let numeroOrden = parseInt(localStorage.getItem("numeroOrden")) || 1;

    function mostrarNumeroOrden() {
      document.getElementById("numeroOrden").textContent =
        "#" + String(numeroOrden).padStart(3, "0");
    }

    mostrarNumeroOrden();

    function agregarServicio() {
      const servicio = document.getElementById("servicio").value.trim();
      const cantidad = parseInt(document.getElementById("cantidad").value);
      const precio = parseFloat(document.getElementById("precio").value);

      if (!servicio || !cantidad || !precio) {
        alert("Completa todos los campos del servicio");
        return;
      }

      const total = cantidad * precio;
      servicios.push({ servicio, cantidad, precio, total });

      actualizarTabla();
      limpiarCampos();
    }

    function actualizarTabla() {
      const tabla = document.getElementById("tablaServicios");
      tabla.innerHTML = "";

      let totalGeneral = 0;

      servicios.forEach((item, index) => {
        totalGeneral += item.total;

        tabla.innerHTML += `
          <tr class="hover:bg-[#1f2937]/80 transition">
            <td class="border border-[#28443c] p-3">${item.servicio}</td>
            <td class="border border-[#28443c] p-3">${item.cantidad}</td>
            <td class="border border-[#28443c] p-3">$${item.precio.toLocaleString()}</td>
            <td class="border border-[#28443c] p-3">$${item.total.toLocaleString()}</td>
            <td class="border border-[#28443c] p-3 text-center no-print">
              <button onclick="eliminarServicio(${index})"
                class="bg-red-700 hover:bg-red-800 text-white px-3 py-1 rounded-lg transition">
                Eliminar
              </button>
            </td>
          </tr>
        `;
      });

      document.getElementById("totalGeneral").textContent = totalGeneral.toLocaleString();
    }

    function limpiarCampos() {
      document.getElementById("servicio").value = "";
      document.getElementById("cantidad").value = "";
      document.getElementById("precio").value = "";
    }

    function eliminarServicio(index) {
      servicios.splice(index, 1);
      actualizarTabla();
    }

    function guardarOrden() {
      const cliente = document.getElementById("cliente").value.trim();
      const documento = document.getElementById("documento").value.trim();
      const telefono = document.getElementById("telefono").value.trim();
      const fecha = document.getElementById("fecha").value;
      const observaciones = document.getElementById("observaciones").value.trim();
      const total = document.getElementById("totalGeneral").textContent;

      if (!cliente || !documento || !telefono || !fecha || servicios.length === 0) {
        alert("Completa los datos del cliente y agrega al menos un servicio");
        return;
      }

      const orden = {
        numeroOrden: document.getElementById("numeroOrden").textContent,
        cliente,
        documento,
        telefono,
        fecha,
        observaciones,
        servicios,
        total
      };

      let ordenes = JSON.parse(localStorage.getItem("ordenesServicio")) || [];
      ordenes.push(orden);

      localStorage.setItem("ordenesServicio", JSON.stringify(ordenes));
      localStorage.setItem("ordenServicio", JSON.stringify(orden));

      alert("Orden guardada correctamente 💾");

      numeroOrden++;
      localStorage.setItem("numeroOrden", numeroOrden);

      limpiarTodo(false);
      mostrarNumeroOrden();
      cargarHistorial();
    }

    function limpiarTodo(confirmar = true) {
      if (!confirmar || confirm("¿Seguro que quieres borrar toda la orden actual?")) {
        document.getElementById("cliente").value = "";
        document.getElementById("documento").value = "";
        document.getElementById("telefono").value = "";
        document.getElementById("fecha").value = "";
        document.getElementById("observaciones").value = "";

        servicios = [];
        actualizarTabla();

        localStorage.removeItem("ordenServicio");
      }
    }

    function cargarHistorial() {
      const tabla = document.getElementById("tablaHistorial");
      tabla.innerHTML = "";

      const ordenes = JSON.parse(localStorage.getItem("ordenesServicio")) || [];

      if (ordenes.length === 0) {
        tabla.innerHTML = `
          <tr>
            <td colspan="6" class="border border-[#28443c] p-4 text-center text-slate-400">
              No hay órdenes guardadas todavía.
            </td>
          </tr>
        `;
        return;
      }

      ordenes.forEach(orden => {
        tabla.innerHTML += `
          <tr class="hover:bg-[#1f2937]/80 transition">
            <td class="border border-[#28443c] p-3">${orden.numeroOrden}</td>
            <td class="border border-[#28443c] p-3">${orden.cliente}</td>
            <td class="border border-[#28443c] p-3">${orden.documento}</td>
            <td class="border border-[#28443c] p-3">${orden.telefono}</td>
            <td class="border border-[#28443c] p-3">${orden.fecha}</td>
            <td class="border border-[#28443c] p-3">$${orden.total}</td>
          </tr>
        `;
      });
    }

    window.onload = function() {
      const ordenGuardada = localStorage.getItem("ordenServicio");

      if (ordenGuardada) {
        const orden = JSON.parse(ordenGuardada);

        document.getElementById("cliente").value = orden.cliente || "";
        document.getElementById("documento").value = orden.documento || "";
        document.getElementById("telefono").value = orden.telefono || "";
        document.getElementById("fecha").value = orden.fecha || "";
        document.getElementById("observaciones").value = orden.observaciones || "";

        servicios = orden.servicios || [];
        actualizarTabla();
      }

      cargarHistorial();
    }
  </script>
</body>
</html>
